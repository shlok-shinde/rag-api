name: RAG CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install dependencies
        run: |
           python -m pip install --upgrade pip
           pip install -r requirements.txt

      - name: Rebuild embeddings
        run: python embed_docs.py

      - name: Start API in mock mode
        run: |
          USE_MOCK_LLM=1 uvicorn app:app --host 0.0.0.0 --port 8000 &
          for i in {1..10}; do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "API failed to start" && exit 1)

      - name: Run semantic tests
        run: python semantic_test.py

      - name: Success
        run: echo "✅ All tests passed! RAG quality maintained."
